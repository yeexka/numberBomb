<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>联谊活动2:数字炸弹</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei",
          sans-serif;
        background: radial-gradient(circle at top, #243b55, #141e30 70%);
        color: white;
        display: grid;
        grid-template-columns: 1.5fr 1fr;
        gap: 28px;
        padding: 32px;
      }
      .panel {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 28px;
        padding: 28px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(12px);
      }
      .main {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      h1 {
        margin: 0;
        font-size: 54px;
        letter-spacing: 2px;
      }
      .subtitle {
        margin-top: 10px;
        font-size: 22px;
        opacity: 0.8;
      }
      .number-box {
        margin: 32px auto;
        width: min(520px, 90%);
        aspect-ratio: 1.4 / 1;
        border-radius: 36px;
        background: linear-gradient(
          145deg,
          rgba(255, 255, 255, 0.95),
          rgba(255, 255, 255, 0.76)
        );
        color: #111827;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 150px;
        font-weight: 900;
        box-shadow:
          0 28px 80px rgba(0, 0, 0, 0.35),
          inset 0 -8px 20px rgba(0, 0, 0, 0.12);
        transition: transform 0.18s ease;
      }
      .number-box.rolling {
        transform: scale(1.02);
      }
      .controls {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        justify-content: center;
      }
      button {
        border: 0;
        border-radius: 999px;
        padding: 18px 30px;
        font-size: 22px;
        font-weight: 800;
        cursor: pointer;
        color: #111827;
        background: #facc15;
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.25);
      }
      button.secondary {
        background: #d1d5db;
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .result {
  margin-top: 22px;
  min-height: 78px;
  text-align: center;

  font-size: 28px;
  font-weight: 900;
  color: #fde68a;

  max-height: 200px;     /* 限制高度 */
  overflow-y: auto;      /* 超出滚动 */

  line-height: 1.4;
}
      .side {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .qr-wrap {
        text-align: center;
      }
      .qr-wrap img {
        width: 230px;
        height: 230px;
        background: white;
        border-radius: 18px;
        padding: 10px;
      }
      .url {
        margin-top: 12px;
        font-size: 14px;
        word-break: break-all;
        opacity: 0.75;
      }
      .round {
        font-size: 22px;
        font-weight: 800;
        margin-bottom: 10px;
      }
      .guess-list {
        list-style: none;
        margin: 0;
        padding: 0;
        max-height: 48vh;
        overflow: auto;
      }
      .guess-list li {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        margin-bottom: 10px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.12);
        font-size: 19px;
      }
      .hint {
        font-size: 15px;
        opacity: 0.74;
        line-height: 1.6;
      }
      .danger {
        background: rgba(248, 113, 113, 0.18) !important;
        border: 1px solid rgba(248, 113, 113, 0.45);
      }
    </style>
  </head>
  <body>
    <section class="panel main">
      <div>
        <h1>💣 数字炸弹</h1>
        <div class="subtitle">
          主持人点击停止，猜测数字与炸弹数字相同的同学会获得“幸运”炸弹😈。
        </div>

        <div id="numberBox" class="number-box rolling">1</div>

        <div class="controls">
          <button id="stopBtn">停止！</button>
          <button id="newRoundBtn" class="secondary">开始新一轮</button>
        </div>

        <div id="result" class="result">等待提交数字……</div>
      </div>

      <div class="hint">
        赞助商™️ Chanceux <br />
        作者版权©️ Yee ๑
      </div>
    </section>

    <aside class="side">
      <section class="panel qr-wrap">
        <div class="round">📱 扫码参与</div>
        <img id="qr" alt="学生扫码二维码" />
        <div id="guessUrl" class="url"></div>
      </section>

      <section class="panel">
        <div class="round">
          第 <span id="roundText">1</span> 轮提交记录（已提交：<span id="count"
            >0</span
          >人）
        </div>
        <ul id="guessList" class="guess-list"></ul>
      </section>
    </aside>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./config.js"></script>
    <script>
      const { SUPABASE_URL, SUPABASE_KEY } = window.APP_CONFIG;
      const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      const numberBox = document.getElementById("numberBox");
      const stopBtn = document.getElementById("stopBtn");
      const newRoundBtn = document.getElementById("newRoundBtn");
      const result = document.getElementById("result");
      const guessList = document.getElementById("guessList");
      const roundText = document.getElementById("roundText");

      let currentRound = 1;
      let currentNumber = 1;
      let timer = null;
      let guesses = [];
      let channel = null;
      let winningNumber = null;

      // const guessUrl = "https://numberbomb.zh-cn.edgeone.cool/guess.html";
      const params = new URLSearchParams(window.location.search);
      const token = params.get("eo_token");
      const time = params.get("eo_time");
      let guessUrl = `${location.origin}/guess.html`;
      if (token && time) {
        guessUrl += `?eo_token=${token}&eo_time=${time}`;
        }
      document.getElementById("guessUrl").textContent = guessUrl;
      document.getElementById("qr").src =
        "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" +
        encodeURIComponent(guessUrl);
      function updateCount() {
        document.getElementById("count").innerText = guesses.length;
      }
      function startRolling() {
        clearInterval(timer);
        numberBox.classList.add("rolling");
        timer = setInterval(() => {
          currentNumber = Math.floor(Math.random() * 100) + 1;
          numberBox.textContent = currentNumber;
        }, 70);
        stopBtn.disabled = false;
        winningNumber = null;
        result.textContent = "等待提交数字……";
      }

      function renderGuesses() {
        guessList.innerHTML = "";

        guesses.forEach((g) => {
          const li = document.createElement("li");
          const isWinner =
            winningNumber !== null && Number(g.number) === Number(winningNumber);

          li.innerHTML = `
            <span>${isWinner ? "💥 " : ""}${escapeHtml(g.name || "匿名")}</span>
            <strong>${g.number}</strong>
          `;

          if (isWinner) {
            li.classList.add("danger");
          }

          guessList.appendChild(li);
        });
      }

      function escapeHtml(str) {
        return String(str).replace(
          /[&<>"']/g,
          (s) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#039;",
            })[s],
        );
      }

      async function loadGame() {
        const { error: deleteError } = await db
          .from("guesses")
          .delete()
          .gte("id", 0);

        if (deleteError) {
          result.textContent = "清空旧提交失败，请检查 Supabase 权限。";
          console.error(deleteError);
          return;
        }

        const { error: resetError } = await db
          .from("game_config")
          .update({ current_round: 1 })
          .eq("id", 1);

        if (resetError) {
          result.textContent = "重置轮数失败，请检查 Supabase 权限。";
          console.error(resetError);
          return;
        }

        currentRound = 1;
        roundText.textContent = currentRound;

        guesses = [];
        renderGuesses();
        updateCount();
        subscribeGuesses();
        startRolling();
      }

      async function loadGuesses() {
        const { data, error } = await db
          .from("guesses")
          .select("*")
          .eq("round_id", currentRound)
          .order("created_at", { ascending: true });

        if (error) {
          console.error(error);
          return;
        }
        guesses = data || [];
        renderGuesses();
        updateCount();
      }

      function subscribeGuesses() {
        if (channel) db.removeChannel(channel);

        channel = db
          .channel("guesses-round-" + currentRound)
          .on(
            "postgres_changes",
            {
              event: "INSERT",
              schema: "public",
              table: "guesses",
            },
            (payload) => {
              if (payload.new.round_id === currentRound) {
                guesses.push(payload.new);
                renderGuesses();
                updateCount();
              }
            },
          )
          .subscribe();
      }

      stopBtn.addEventListener("click", () => {
        clearInterval(timer);
        timer = null;
        numberBox.classList.remove("rolling");
        stopBtn.disabled = true;

     
        if (currentRound === 2) {
          const submittedNumbers = new Set(guesses.map((g) => Number(g.number)));
          const safeNumbers = [];

          for (let i = 1; i <= 100; i++) {
            if (!submittedNumbers.has(i)) {
              safeNumbers.push(i);
            }
          }

          if (safeNumbers.length === 0) {
            const randomIndex = Math.floor(Math.random() * guesses.length);
  const selectedGuess = guesses[randomIndex];

  winningNumber = Number(selectedGuess.number);
  currentNumber = winningNumber;
  numberBox.textContent = currentNumber;

  const winners = guesses.filter(
    (g) => Number(g.number) === Number(winningNumber),
  );

  result.innerHTML =
    `💥 炸弹数字：${winningNumber}<br>` +
    `中弹（${winners.length}人）：<br>` +
    winners.map((w) => `<div>${escapeHtml(w.name || "匿名")}</div>`).join("");

  renderGuesses();
  return;
          }

          const randomIndex = Math.floor(Math.random() * safeNumbers.length);
          winningNumber = safeNumbers[randomIndex];
          currentNumber = winningNumber;
          numberBox.textContent = currentNumber;

          result.innerHTML =
            `✅ 无人中弹，本轮安全。`;

          renderGuesses();
          return;
        }

        if (guesses.length === 0) {
          winningNumber = null;
          result.textContent = "⚠️ 当前还没有人提交数字，无法抽取炸弹。";
          renderGuesses();
          return;
        }

        // 其他轮次：从本轮已提交记录里随机抽一条，
        // 把这条记录的数字作为炸弹数字。
        // 如果多人提交了这个数字，会一起中弹。
        const randomIndex = Math.floor(Math.random() * guesses.length);
        const selectedGuess = guesses[randomIndex];

        winningNumber = Number(selectedGuess.number);
        currentNumber = winningNumber;
        numberBox.textContent = currentNumber;

        const winners = guesses.filter(
          (g) => Number(g.number) === Number(winningNumber),
        );

        if (winners.length > 0) {
          result.innerHTML =
            `💥 炸弹数字：${winningNumber}<br>` +
            `中弹（${winners.length}人）：<br>` +
            winners.map((w) => `<div>${escapeHtml(w.name || "匿名")}</div>`).join("");
        } else {
          result.textContent = "✅ 无人中弹，本轮安全。";
        }

        renderGuesses();
      });

      newRoundBtn.addEventListener("click", async () => {
        const confirmStart = confirm("确定开始新一轮吗？当前轮数据将不再参与对比。");

  if (!confirmStart) {
    return;
  }

  const nextRound = currentRound + 1;

  const { error } = await db
    .from("game_config")
    .update({ current_round: nextRound })
    .eq("id", 1);

  if (error) {
    result.textContent = "新一轮创建失败，请检查权限。";
    console.error(error);
    return;
  }

  currentRound = nextRound;
  roundText.textContent = currentRound;
  winningNumber = null;

  guesses = [];
  renderGuesses();
  updateCount();

  subscribeGuesses();
  startRolling();
      });

      loadGame();
      setInterval(loadGuesses, 3000);
    </script>
  </body>
</html>
