<!doctype html>
<html>
  <head>
    <title>猜数字</title>
  </head>
  <body>
    <h2>数字炸弹</h2>
    <input id="name" placeholder="你的名字" /><br /><br />
    <input id="num" type="number" placeholder="1-100" /><br /><br />
    <button onclick="submitGuess()">提交</button>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
      const supabase = supabase.createClient(
        "https://wytqbmjlakbgiqgbwbhi.supabase.co",
        "sb_publishable_x5M4xqdWnziSTm3SAV6U2Q_Zz-WTTia",
      );

      async function submitGuess() {
        const name = document.getElementById("name").value;
        const number = parseInt(document.getElementById("num").value);

        await supabase.from("guesses").insert([{ name, number }]);
        alert("提交成功！");
      }
    </script>
  </body>
</html>
