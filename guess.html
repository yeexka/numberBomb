<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数字炸弹提交</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: linear-gradient(160deg, #111827, #1f2937);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }
    .card {
      width: min(440px, 100%);
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 18px 50px rgba(0,0,0,.3);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 34px;
    }
    p {
      margin: 0 0 24px;
      opacity: .78;
      line-height: 1.6;
    }
    label {
      display: block;
      margin: 18px 0 8px;
      font-weight: 800;
    }
    input {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 16px;
      font-size: 20px;
      outline: none;
    }
    button {
      margin-top: 24px;
      width: 100%;
      border: 0;
      border-radius: 999px;
      padding: 17px;
      font-size: 21px;
      font-weight: 900;
      background: #facc15;
      color: #111827;
      cursor: pointer;
    }
    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }
    .msg {
      margin-top: 18px;
      min-height: 28px;
      font-size: 18px;
      font-weight: 800;
      color: #fde68a;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>💣 数字炸弹</h1>
    <p>请输入你的姓名和你猜的数字。老师在大屏点击停止后，如果停在你猜的数字，你就是幸运炸弹。</p>

    <label for="name">姓名</label>
    <input id="name" placeholder="例如：张三" autocomplete="name" />

    <label for="number">猜一个 1-100 的数字</label>
    <input id="number" type="number" min="1" max="100" placeholder="例如：37" />

    <button id="submitBtn">提交</button>
    <div id="msg" class="msg"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <script>
    const { SUPABASE_URL, SUPABASE_KEY } = window.APP_CONFIG;
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const submitBtn = document.getElementById("submitBtn");
    const msg = document.getElementById("msg");

    async function getCurrentRound() {
      const { data, error } = await db.from("game_config").select("*").eq("id", 1).single();
      if (error) throw error;
      return data.current_round;
    }

    submitBtn.addEventListener("click", async () => {
      const name = document.getElementById("name").value.trim();
      const number = Number(document.getElementById("number").value);

      if (!name) {
        msg.textContent = "请先填写姓名。";
        return;
      }

      if (!Number.isInteger(number) || number < 1 || number > 100) {
        msg.textContent = "请输入 1-100 之间的整数。";
        return;
      }

      submitBtn.disabled = true;
      msg.textContent = "正在提交……";

      try {
        const currentRound = await getCurrentRound();

        const { error } = await db.from("guesses").insert([{
          round_id: currentRound,
          name,
          number
        }]);

        if (error) throw error;

        msg.textContent = "提交成功！请看大屏。";
        document.getElementById("number").value = "";
      } catch (err) {
        console.error(err);
        msg.textContent = "提交失败，请检查网络或告诉老师。";
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
