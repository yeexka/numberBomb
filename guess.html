<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数字炸弹提交</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: linear-gradient(160deg, #111827, #1f2937);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }
    .card {
      width: min(440px, 100%);
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 18px 50px rgba(0,0,0,.3);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 34px;
    }
    p {
      margin: 0 0 24px;
      opacity: .78;
      line-height: 1.6;
    }
    label {
      display: block;
      margin: 18px 0 8px;
      font-weight: 800;
    }
    input {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 16px;
      font-size: 20px;
      outline: none;
    }
    button {
      margin-top: 24px;
      width: 100%;
      border: 0;
      border-radius: 999px;
      padding: 17px;
      font-size: 21px;
      font-weight: 900;
      background: #facc15;
      color: #111827;
      cursor: pointer;
    }
    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }
    .msg {
      margin-top: 18px;
      min-height: 28px;
      font-size: 18px;
      font-weight: 800;
      color: #fde68a;
    }
    .hidden {
      display: none;
    }
    .name-badge {
      margin: 14px 0 4px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(250,204,21,.16);
      border: 1px solid rgba(250,204,21,.35);
      font-size: 17px;
      line-height: 1.5;
    }
    .small-tip {
      margin-top: 8px;
      font-size: 14px;
      opacity: .7;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>💣 数字炸弹</h1>

    <section id="nameSection">
      <p>请先输入你的昵称。后续轮次都会使用这个昵称哦。禁止称呼自己为他人的家长😡😡2026谨言慎行🌬</p>

      <label for="name">昵称</label>
      <input id="name" placeholder="例如：冯彰美佳ovo🤨" autocomplete="name" />

      <button id="lockNameBtn" type="button">确认昵称☑️</button>
    </section>

    <section id="guessSection" class="hidden">
      <p>请输入你猜的数字。在大屏点击停止后，如果停在你猜的数字，你会获得幸运炸弹，嘿嘿嘿……😈</p>

      <div id="lockedNameText" class="name-badge"></div>

      <label for="number">猜一个 1-100 的数字</label>
      <input id="number" type="number" min="1" max="100" placeholder="例如：37" />

      <div id="submittedNumberText" class="name-badge hidden"></div>

      <button id="submitBtn">提交</button>
    </section>

    <div id="msg" class="msg"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <script>
    const { SUPABASE_URL, SUPABASE_KEY } = window.APP_CONFIG;
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const nameSection = document.getElementById("nameSection");
    const guessSection = document.getElementById("guessSection");
    const nameInput = document.getElementById("name");
    const lockNameBtn = document.getElementById("lockNameBtn");
    const lockedNameText = document.getElementById("lockedNameText");
    const submittedNumberText = document.getElementById("submittedNumberText");
    const submitBtn = document.getElementById("submitBtn");
    const msg = document.getElementById("msg");

    let lockedName = localStorage.getItem("numberBombName");

    function showNameStep() {
      nameSection.classList.remove("hidden");
      guessSection.classList.add("hidden");
      msg.textContent = "";
    }

    function showGuessStep() {
      nameSection.classList.add("hidden");
      guessSection.classList.remove("hidden");
      lockedNameText.textContent = `你说你叫：${lockedName}`;
      msg.textContent = "";
    }

    function initPage() {
      if (lockedName) {
        showGuessStep();
      } else {
        showNameStep();
      }
    }

    lockNameBtn.addEventListener("click", () => {
      const name = nameInput.value.trim();

      if (!name) {
        msg.textContent = "请先输入昵称。";
        return;
      }
if (name.length > 10) {
  msg.textContent = "昵称最多10个字。";
  return;
}
      lockedName = name;
      localStorage.setItem("numberBombName", lockedName);
      showGuessStep();
      msg.textContent = "昵称已确认，后续轮次将使用这个昵称。";
    });
async function checkMyResult() {
  const currentRound = await getCurrentRound();
  const lastSubmittedRound = localStorage.getItem("numberBombLastSubmittedRound");
  const lastSubmittedNumber = localStorage.getItem("numberBombLastSubmittedNumber");

  if (String(currentRound) !== lastSubmittedRound || !lastSubmittedNumber) {
    return;
  }

  const { data, error } = await db
    .from("game_config")
    .select("current_bomb")
    .eq("id", 1)
    .single();

  if (error || data.current_bomb === null) return;

  if (Number(lastSubmittedNumber) === Number(data.current_bomb)) {
    msg.textContent = `💥 你中弹了！炸弹数字是 ${data.current_bomb}`;
  } else {
    msg.textContent = `✅ 你安全了！炸弹数字是 ${data.current_bomb}`;
  }
}


    async function getCurrentRound() {
      const { data, error } = await db
        .from("game_config")
        .select("*")
        .eq("id", 1)
        .single();

      if (error) throw error;
      return data.current_round;
    }

    function setSubmittedState(currentRound, submittedNumber) {
      submitBtn.disabled = true;
      submitBtn.textContent = "本轮已提交";

      if (submittedNumber) {
        submittedNumberText.textContent = `你本轮提交的数字是：${submittedNumber}`;
        submittedNumberText.classList.remove("hidden");
        msg.textContent = `你已经提交过第 ${currentRound} 轮了，请等待下一轮。`;
      } else {
        submittedNumberText.classList.add("hidden");
        msg.textContent = `你已经提交过第 ${currentRound} 轮了，请等待下一轮。`;
      }
    }

    function setReadyState() {
      submitBtn.disabled = false;
      submitBtn.textContent = "提交";
      submittedNumberText.textContent = "";
      submittedNumberText.classList.add("hidden");
    }

    async function refreshSubmitState() {
      try {
        const currentRound = await getCurrentRound();
        const lastSubmittedRound = localStorage.getItem("numberBombLastSubmittedRound");
        const lastSubmittedNumber = localStorage.getItem("numberBombLastSubmittedNumber");

        if (String(currentRound) === lastSubmittedRound) {
          setSubmittedState(currentRound, lastSubmittedNumber);
        } else {
          // 新一轮开始后，清掉上一轮显示的数字，并恢复提交按钮。
          setReadyState();
        }
      } catch (err) {
        console.error(err);
        msg.textContent = "读取当前轮次失败，请刷新页面或告诉老师。";
      }
    }

    submitBtn.addEventListener("click", async () => {
      const name = lockedName;
      const number = Number(document.getElementById("number").value);

      if (!name) {
        msg.textContent = "请先确认昵称，再提交数字。";
        showNameStep();
        return;
      }

      if (!Number.isInteger(number) || number < 1 || number > 100) {
        msg.textContent = "请输入 1-100 之间的整数。";
        return;
      }

      submitBtn.disabled = true;
      msg.textContent = "正在提交……";

      try {
        // 每次提交前都重新读取当前轮次，避免学生不刷新页面导致串轮。
        const currentRound = await getCurrentRound();
        const lastSubmittedRound = localStorage.getItem("numberBombLastSubmittedRound");

        // 同一轮已经提交过，就不再允许重复提交。
        if (String(currentRound) === lastSubmittedRound) {
          const lastSubmittedNumber = localStorage.getItem("numberBombLastSubmittedNumber");
          setSubmittedState(currentRound, lastSubmittedNumber);
          return;
        }

        const { data, error } = await db
          .from("guesses")
          .insert([{
            round_id: currentRound,
            name,
            number
          }])
          .select()
          .single();

        if (error) throw error;
        if (!data || !data.id) throw new Error("数据库没有返回提交记录");

        localStorage.setItem("numberBombLastSubmittedRound", String(currentRound));
        localStorage.setItem("numberBombLastSubmittedNumber", String(number));
        document.getElementById("number").value = "";
        setSubmittedState(currentRound, number);
      } catch (err) {
        console.error(err);
        msg.textContent = "提交失败，请检查网络或告诉老师。";
        setReadyState();
      }
    });

    initPage();

    // 学生页面可能一直开着不刷新，所以每 2 秒检查一次当前轮次。
    // 老师点“开始新一轮”后，这里会自动把按钮恢复为可提交。
    setInterval(refreshSubmitState, 2000);
    setInterval(checkMyResult, 2000);
    refreshSubmitState();
  </script>
</body>
</html>
