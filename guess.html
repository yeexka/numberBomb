<!doctype html>
<html>
  <head>
    <title>数字炸弹大屏</title>
  </head>
  <body>
    <h1>💣 数字炸弹</h1>

    <button onclick="reset()">🔄 重新生成炸弹</button>

    <h2 id="status">等待开始...</h2>

    <ul id="list"></ul>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
      const supabase = supabase.createClient(
        "https://wytqbmjlakbgiqgbwbhi.supabase.co",
        "sb_publishable_x5M4xqdWnziSTm3SAV6U2Q_Zz-WTTia",
      );

      let bomb = null;

      async function loadBomb() {
        const { data } = await supabase
          .from("game")
          .select("*")
          .eq("id", 1)
          .single();

        bomb = data.bomb;
        document.getElementById("status").innerText = "游戏进行中（1-100）";
      }

      async function reset() {
        const newBomb = Math.floor(Math.random() * 100) + 1;

        await supabase.from("game").update({ bomb: newBomb }).eq("id", 1);

        document.getElementById("list").innerHTML = "";
        document.getElementById("status").innerText = "新一轮开始！";

        bomb = newBomb;
      }

      function addGuess(g) {
        const li = document.createElement("li");
        li.innerText = `${g.name} 猜了 ${g.number}`;

        if (g.number === bomb) {
          li.innerText += " 💥中弹！";
          document.getElementById("status").innerText =
            `🎯 ${g.name} 是幸运炸弹！`;
        }

        document.getElementById("list").appendChild(li);
      }

      loadBomb();

      supabase
        .channel("realtime")
        .on(
          "postgres_changes",
          {
            event: "INSERT",
            schema: "public",
            table: "guesses",
          },
          (payload) => {
            addGuess(payload.new);
          },
        )
        .subscribe();
    </script>
  </body>
</html>
